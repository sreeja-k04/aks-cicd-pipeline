trigger:
  branches:
    include:
      - main

variables:
  dockerhubUser: 'sreejak04'
  imageName: 'helloworld'
  imageTag: '$(Build.BuildId)'
  fullImage: '$(dockerhubUser)/$(imageName):$(imageTag)'

stages:

# =========================
# BUILD STAGE
# =========================
- stage: Build
  displayName: 'Build and Push Docker Image'

  jobs:
  - job: BuildJob

    pool:
      vmImage: 'ubuntu-latest'

    steps:

    - checkout: self

    # Build Docker Image
    - task: Docker@2
      displayName: 'Build Docker Image'

      inputs:
        command: 'build'
        containerRegistry: 'dockerhub-connection'
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        repository: '$(dockerhubUser)/$(imageName)'
        tags: |
          $(imageTag)

    # Push Docker Image
    - task: Docker@2
      displayName: 'Push Docker Image to DockerHub'

      inputs:
        command: 'push'
        containerRegistry: 'dockerhub-connection'
        repository: '$(dockerhubUser)/$(imageName)'
        tags: |
          $(imageTag)

# =========================
# DEPLOY STAGE
# =========================
- stage: Deploy
  displayName: 'Deploy to AKS'

  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: DeployJob

    pool:
      vmImage: 'ubuntu-latest'

    environment: 'production'

    strategy:
      runOnce:
        deploy:

          steps:

          - checkout: self

          # Create DockerHub Pull Secret
          - task: KubernetesManifest@1
            displayName: 'Create DockerHub Pull Secret'

            inputs:
              action: 'createSecret'
              kubernetesServiceConnection: 'aks-connection'
              namespace: 'default'
              secretType: 'dockerRegistry'
              secretName: 'dockerhub-secret'
              dockerRegistryEndpoint: 'dockerhub-connection'

          # Deploy to AKS
          - task: KubernetesManifest@1
            displayName: 'Deploy to AKS'

            inputs:
              action: 'deploy'
              kubernetesServiceConnection: 'aks-connection'
              namespace: 'default'

              manifests: |
                $(Build.SourcesDirectory)/k8s/deployment.yaml
                $(Build.SourcesDirectory)/k8s/service.yaml

              containers: |
                $(fullImage)