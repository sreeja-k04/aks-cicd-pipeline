<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    background: #080b14;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .page { width: 100%; max-width: 540px; text-align: center; }
  .orbit { position: relative; width: 80px; height: 80px; margin: 0 auto 2rem; }
  .orbit-ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid #1a3a6a; animation: spin 6s linear infinite; }
  .orbit-ring::before { content: ""; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; border-radius: 50%; background: #4a9eff; box-shadow: 0 0 10px #4a9eff; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .orbit-core { position: absolute; inset: 14px; border-radius: 50%; background: #0d1a33; border: 1.5px solid #1a3a6a; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .badge { display: inline-flex; align-items: center; gap: 7px; background: #0d1a2e; border: 1px solid #1a3a6a; border-radius: 20px; padding: 5px 16px; font-size: 11px; color: #5a9fd4; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; margin-bottom: 1.5rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4a9eff; animation: glow 2s ease-in-out infinite; }
  @keyframes glow { 0%,100% { opacity: 1; box-shadow: 0 0 4px #4a9eff; } 50% { opacity: 0.4; box-shadow: none; } }
  h1 { font-size: 3rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 1rem; color: #e8edf5; }
  h1 .accent { color: #4a9eff; position: relative; }
  h1 .accent::after { content: ""; position: absolute; bottom: 2px; left: 0; right: 0; height: 2px; background: #1a4a8a; border-radius: 2px; }
  .subtitle { font-size: 0.95rem; color: #4a5568; line-height: 1.7; margin-bottom: 2.5rem; max-width: 340px; margin-left: auto; margin-right: auto; }
  .stack { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 2.5rem; }
  .tag { display: flex; align-items: center; gap: 6px; background: #0d1120; border: 1px solid #1e2640; border-radius: 8px; padding: 7px 14px; font-size: 12px; color: #8899bb; font-weight: 500; }
  .tag-dot { width: 5px; height: 5px; border-radius: 50%; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: #111827; border: 1px solid #1a2234; border-radius: 12px; overflow: hidden; margin-bottom: 2rem; }
  .stat { background: #0d1120; padding: 1rem 0.5rem; text-align: center; }
  .stat-val { font-size: 1.3rem; font-weight: 700; color: #c8d8f0; letter-spacing: -0.02em; display: block; }
  .stat-label { font-size: 10px; color: #374151; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; display: block; }
  .footer-row { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: #252d3d; letter-spacing: 0.05em; text-transform: uppercase; }
  .footer-sep { width: 3px; height: 3px; border-radius: 50%; background: #252d3d; }
</style>
</head>
<body>
<div class="page">
  <div class="orbit">
    <div class="orbit-ring"></div>
    <div class="orbit-core">&#x2601;&#xFE0F;</div>
  </div>
  <div class="badge"><div class="dot"></div>Live on Azure</div>
  <h1>Hello, <span class="accent">World</span></h1>
  <p class="subtitle">Successfully containerised and deployed to Azure Kubernetes Service via Docker and ACR.</p>
  <div class="stack">
    <span class="tag"><span class="tag-dot" style="background:#4a9eff"></span>Docker</span>
    <span class="tag"><span class="tag-dot" style="background:#326ce5"></span>Kubernetes</span>
    <span class="tag"><span class="tag-dot" style="background:#0078d4"></span>Azure AKS</span>
    <span class="tag"><span class="tag-dot" style="background:#009900"></span>nginx</span>
    <span class="tag"><span class="tag-dot" style="background:#f05032"></span>ACR</span>
  </div>
  <div class="stats">
    <div class="stat"><span class="stat-val">2</span><span class="stat-label">Replicas</span></div>
    <div class="stat"><span class="stat-val">:80</span><span class="stat-label">Port</span></div>
    <div class="stat"><span class="stat-val" style="color:#3a9e6a;font-size:0.9rem">&#9679; Running</span><span class="stat-label">Status</span></div>
  </div>
  <div class="footer-row">
    <span>Azure Cloud Infrastructure Lab</span>
    <span class="footer-sep"></span>
    <span>Docker + AKS</span>
  </div>
</div>
</body>
</html>
